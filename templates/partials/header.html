<header class="header fixed top-0 z-40 mx-auto min-h-14 w-full">
  <div class="mx-auto w-full max-w-4xl p-3" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap">
    <a class="text-2xl font-semibold" href="{{ get_url(path=``) }}">🔊 {{ config.title }}</a>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="btn-dark h-6 w-6 shrink-0 cursor-pointer text-[0px] [background:url(./icons/theme.svg)_left_center/cover_no-repeat] dark:bg-right dark:invert" role="button" aria-label="Dark"></div>
      <a class="primary-link" href="https://github.com/buzz/volctl" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none">
        <svg style="width:18px;height:18px;fill:currentColor;flex-shrink:0" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span>GitHub</span>
      </a>
    </div>
    <script>
      const htmlClass = document.documentElement.classList;
      setTimeout(() => htmlClass.remove("not-ready"), 10);
      const setDark = (isDark) => { isDark ? htmlClass.add("dark") : htmlClass.remove("dark"); localStorage.setItem("dark", isDark); };
      const darkScheme = window.matchMedia("(prefers-color-scheme: dark)");
      setDark(htmlClass.contains("dark") ? true : (localStorage.getItem("dark") === "true" || darkScheme.matches));
      darkScheme.addEventListener("change", (e) => setDark(e.matches));
      document.querySelector(".btn-dark").addEventListener("click", () => setDark(localStorage.getItem("dark") !== "true"));
    </script>
  </div>
</header>
