[package]
name = "volctl"
version = "0.1.0"
edition = "2021"

[dependencies]
async-channel = "2.5"
gdk = { version = "0.11", package = "gdk4", features = ["v4_18"] }
gdk-x11 = { version = "0.11", package = "gdk4-x11", features = ["v4_18"] }
glib = "0.22"
gtk = { version = "0.11", package = "gtk4", features = ["v4_18"] }
gtk-layer-shell = { version = "0.8", package = "gtk4-layer-shell" }
ksni = "0.2"
libpulse = { version = "2.28", package = "libpulse-binding", features = ["pa_v8"] }
slice_as_array = "1.1"
thiserror = "2.0"
x11rb = "0.13"
